name: CI/CD CHAT APPLICATION MERN STACK
#general.yaml
on:
  push:
    paths: [ 'backend/**' , 'frontend/**' , '.github/workflows/**']
    branches: [ main , master ]
  pull_request: 
    paths: [ 'backend/**' , 'frontend/**' ]
    branches: [ main , master]


jobs:
  test-backend:
    name: test-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      mongodb:
        image: mongo
        ports:
          - 27017:27017
      redis:
        image: redis
        ports:
          - 6379:6379
    steps:
      - name: CHECKOUT THE CODE 
        uses: actions/checkout@v4

      - name: INSTALLER NODE-JS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

        env:
          PORT: 5000
          MONGO_URI: mongodb://localhost:27017/db_chat
          JWT_SECRET: fab5b1b57daff5bff75640ebb61576312be28a52ff30e35573a40a8b75e94e90bee41e9939c25f23157d0e876c3976506a137348776268132cacbc9c1556eda1
          REFRESH_SECRET: 4b3805bb252079fca5cb26d82bdbd2acb3db18b8088238d2d7b1d8951bd36b26b3960a66299e19c674cf5324fc0870160919d3c8514ef8888d739baf7579a818
          NODE_ENV: development #if you are still development or production
          REDIS_URI: redis://localhost:6379
      
      - name: INSTALLER DEPENDENCIES
        run: npm install

      - name: RUN TESTS
        run: npm test

      - name: BUILD
        run: npm run build

  deploy-backend:
    name: deploy-backend
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - name: BUILD IMAGE DOCKER
        run: |
          cd backend
          docker build -t backend-chat .
        
      - name: DEPLOY BACKEND
        run: echo "deploy backend"
  
  test-frontend:
    name: test-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: CHECKOUT THE CODE 
        uses: actions/checkout@v4

      - name: INSTALLER NODE-JS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        env:
          VITE_BACKEND_URL: http://localhost:5000/api
          VITE_SECRET_CRYPTAGE: mySecretKeyForCryptage
        
      - name: INSTALLER DEPENDENCIES
        run: npm install

      - name: RUN TESTS
        run: npm test

      - name: BUILD
        run: npm run build
  deploy-frontend:
    name: deploy-frontend
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - uses: actions/checkout@v4
      - name: BUILD IMAGE DOCKER
        run: |
          cd frontend
          docker build -t frontend-chat .
      - name: DEPLOY FRONTEND
        run: echo "deploy frontend"
        
      - name: VERIFY IMAGES DOCKER
        run: docker images
    
        
